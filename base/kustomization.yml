apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-app

resources:
  - namespace.yaml
  - configmap.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/hpa.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/name:       devops-app
  app.kubernetes.io/managed-by: kustomize
