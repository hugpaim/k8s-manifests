apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-app

resources:
  - namespace.yml
  - configmap.yml
  - app/deployment.yml
  - app/service.yml
  - app/hpa.yml
  - ingress.yml

commonLabels:
  app.kubernetes.io/name:       devops-app
  app.kubernetes.io/managed-by: kustomize
