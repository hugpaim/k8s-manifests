apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - path: replica-patch.yaml
  - path: image-patch.yaml
  - path: ingress-patch.yaml

configMapGenerator:
  - name: devops-app-config
    behavior: merge
    literals:
      - FLASK_ENV=development
      - LOG_LEVEL=DEBUG
