---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-prod

resources:
  - ../../base

patches:
  - path: replica-patch.yml
  - path: image-patch.yml
  - path: ingress-patch.yml
  - path: resources.patch.yml

configMapGenerator:
  - name: devops-app-config
    behavior: merge
    literals:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
---
